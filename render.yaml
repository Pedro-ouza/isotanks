services:
  - type: web
    name: isotank-crm
    env: python
    region: ohio
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn backend.app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: isotank-crm-db
          property: connectionString

  - type: pserv
    name: isotank-crm-db
    env: postgres
    region: ohio
    plan: free
