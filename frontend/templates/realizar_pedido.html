{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>Realizar Pedido</h1>
    <p class="text-muted">Preencha os dados do pedido. Você pode solicitar múltiplos isotanks (linhas de reserva) em um único pedido futuramente, mas hoje criaremos uma linha por vez para simplificar.</p>
</div>

<div class="card form-container">
    <form id="form-realizar-pedido">
        <div class="form-grid">
            <div class="form-group">
                <label for="cliente">Cliente *</label>
                <input type="text" id="cliente" required>
            </div>
            <div class="form-group">
                <label for="produtoSolicitado">Produto Solicitado *</label>
                <input type="text" id="produtoSolicitado" required>
            </div>
            <div class="form-group">
                <label for="quantidadeSolicitada">Quantidade (Isotanks) *</label>
                <input type="number" id="quantidadeSolicitada" min="1" value="1" required>
            </div>
            <div class="form-group">
                <label for="dataNecessidade">Data de Necessidade *</label>
                <input type="date" id="dataNecessidade" required>
            </div>
            <div class="form-group">
                <label for="solicitante">E-mail do Solicitante *</label>
                <input type="email" id="solicitante" required>
            </div>
            <div class="form-group">
                <label for="observacoesPedido">Observações</label>
                <input type="text" id="observacoesPedido">
            </div>
        </div>
        
        <div id="form-message" class="mt-4"></div>

        <div class="form-actions mt-4">
            <button type="submit" class="btn btn-primary">Registrar Pedido</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pedidos.js') }}"></script>
{% endblock %}
