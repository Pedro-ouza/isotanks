{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <div>
      <h1 class="page-title">Visão geral</h1>
      <p class="text-muted">Acompanhe os principais indicadores operacionais do dia.</p>
    </div>
</div>

<div class="grid kpi-grid">
    <div class="kpi-card">
        <div class="kpi-icon green">D</div>
        <div class="kpi-details">
            <h3>Isotanks Disponíveis</h3>
            <div class="value" id="kpi-isotanks-disponiveis">--</div>
        </div>
    </div>

    <div class="kpi-card">
        <div class="kpi-icon blue">R</div>
        <div class="kpi-details">
            <h3>Reservas (Total)</h3>
            <div class="value" id="kpi-reservas-hoje">--</div>
        </div>
    </div>

    <div class="kpi-card">
        <div class="kpi-icon yellow">P</div>
        <div class="kpi-details">
            <h3>Pedidos Abertos</h3>
            <div class="value" id="kpi-pedidos-abertos">--</div>
        </div>
    </div>
</div>

<div class="card">
    <h3 class="mb-4">Últimos pedidos (Abertos)</h3>
    <div class="table-container">
        <table class="table" id="tabela-ultimos-pedidos">
            <thead>
                <tr>
                    <th>Pedido</th>
                    <th>Cliente</th>
                    <th>Produto</th>
                    <th>Status</th>
                    <th>Isotank</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

{% endblock %}
