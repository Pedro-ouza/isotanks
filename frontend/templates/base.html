<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Evera Isotank Hub — plataforma de gestão de isotanks, pedidos e reservas.">
    <title>{% block page_title %}Isotank Gestor{% endblock %} | Evera</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-layout">
        <!-- Top Navbar -->
        <header class="navbar">
            <div class="navbar-brand">
                <div class="logo-circle">E</div>
                <span class="navbar-title">Evera Isotank Hub</span>
            </div>

            <nav class="navbar-nav">
                <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">Início</a>
                <a href="/gestao-isotanks" class="nav-link {% if active_page == 'aprovar' %}active{% endif %}">Aprovar Isotanks</a>
                <a href="/gerenciamento-pedidos" class="nav-link {% if active_page == 'gerenciar' %}active{% endif %}">
                    Pedidos e Reservas
                    <span id="sidebar-badge-solicitados" class="badge bg-warning" style="display:none;"></span>
                </a>
                <a href="/realizar-pedido" class="nav-link {% if active_page == 'pedido' %}active{% endif %}">Novo Pedido</a>
                <a href="/escolher-isotanks" class="nav-link {% if active_page == 'alocar' %}active{% endif %}">Alocar Isotanks</a>
                <a href="/upload-isotanks" class="nav-link {% if active_page == 'upload' %}active{% endif %}">Importar</a>
            </nav>

            <div class="navbar-actions">
                <button id="btn-theme-toggle" class="btn btn-outline btn-sm">Modo Escuro</button>
                <div class="avatar">TE</div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <main class="container">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <!-- Scripts Globais -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
