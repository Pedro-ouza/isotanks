{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <div>
      <h1 class="page-title">Importar isotanks</h1>
      <p class="text-muted">Faça upload do CSV de staging para atualizar o estoque.</p>
    </div>
</div>

<div class="card" style="max-width: 600px;">
    <p class="text-muted mb-4">
      Use o template oficial de isotanks. Arquivos devem estar no formato CSV com cabeçalho.
    </p>

    <form id="form-upload-staging" enctype="multipart/form-data">
        <div class="form-group">
            <label for="fileCsv">Arquivo CSV</label>
            <input type="file" name="file" id="fileCsv" accept=".csv" required style="padding: 1rem 0;">
        </div>
        
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Enviar arquivo</button>
        </div>
    </form>
</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/isotanks.js') }}"></script>
{% endblock %}
