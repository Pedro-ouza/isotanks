{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Isotank import</h1>
        <p class="text-muted">Faça upload do CSV de staging para atualizar o estoque.</p>
    </div>
</div>

<div class="card" style="max-width: 600px;">
    <p class="text-muted mb-4">
      Use o template oficial de isotanks. Arquivos devem estar no formato CSV com cabeçalho.
    </p>

    <form id="form-upload-staging" enctype="multipart/form-data">
        <div class="form-group">
            <label for="fileCsv">Arquivo CSV</label>
            <input type="file" name="file" id="fileCsv" accept=".csv" required>
        </div>
        
        <div class="mt-4 flex-between">
            <button type="submit" class="btn btn-primary">Upload CSV</button>
            <div id="upload-message" class="text-muted" style="font-size: 0.85rem;"></div>
        </div>
    </form>
</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/isotanks.js') }}"></script>
{% endblock %}
