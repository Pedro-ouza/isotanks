{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>Upload de Isotanks (Staging)</h1>
    <p class="text-muted">Faça o upload do arquivo CSV recebido do fornecedor contendo os novos isotanks.</p>
</div>

<div class="card form-container">
    <form id="form-upload-staging">
        <div class="form-group">
            <label for="fileCsv">Arquivo CSV</label>
            <input type="file" id="fileCsv" accept=".csv" required>
        </div>
        
        <div id="upload-message" class="mt-4"></div>

        <div class="form-actions mt-4">
            <button type="submit" class="btn btn-primary">Enviar e Processar</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/isotanks.js') }}"></script>
{% endblock %}
