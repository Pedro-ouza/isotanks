name: SPFx CI

on:
  pull_request:
    paths:
      - spfx/**
      - .github/workflows/spfx-ci.yaml
  push:
    branches:
      - main
    paths:
      - spfx/**
      - .github/workflows/spfx-ci.yaml

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: spfx/.nvmrc
          cache: npm
          cache-dependency-path: spfx/package-lock.json
      - run: npm ci
        working-directory: spfx
      - name: Build and package SPFx
        id: ship
        continue-on-error: true
        run: npm run ship > ../spfx-ship.log 2>&1
        working-directory: spfx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spfx-ship-log
          path: spfx-ship.log
      - name: Fail on ship error
        if: steps.ship.outcome == 'failure'
        run: exit 1
