version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/spfx"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      spfx-tooling:
        dependency-type: "development"
        patterns:
          - "@microsoft/*"
          - "@rushstack/*"
          - "@typescript-eslint/*"
          - "eslint*"
          - "typescript"
      spfx-runtime:
        dependency-type: "production"
        patterns:
          - "@microsoft/sp-*"
          - "@fluentui/*"
          - "@pnp/*"
          - "react"
          - "react-dom"
